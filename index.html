<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাংলাদেশের ইতিহাস</title>

<!-- ✅ AdSense Code -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4253919332594790"
     crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.video-bg {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay {
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}
</style>

<script>
let isAdmin = localStorage.getItem("admin")==="true";

function go(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

function enterSite(){
  document.getElementById("intro").style.display="none";
  go("home");
}

function login(){
  let p = document.getElementById("pass").value;
  if(p==="admin123"){
    localStorage.setItem("admin","true");
    isAdmin=true;
    updateUI();
    go("home");
  } else alert("Wrong Password");
}

function logout(){
  localStorage.removeItem("admin");
  isAdmin=false;
  updateUI();
}

function updateUI(){
  document.getElementById("adminBtn").style.display = isAdmin?"none":"block";
  document.getElementById("logoutBtn").style.display = isAdmin?"block":"none";
  document.getElementById("addBtn").style.display = isAdmin?"block":"none";
}

function saveHistory(){
  let file = document.getElementById("img").files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = e => saveData(e.target.result);
    reader.readAsDataURL(file);
  } else saveData("");
}

function saveData(img){
  let data = JSON.parse(localStorage.getItem("history")||"[]");

  data.push({
    year:year.value,
    title:title.value,
    detail:details.value,
    img:img
  });

  localStorage.setItem("history",JSON.stringify(data));
  alert("Saved!");
  go("history");
  loadHistory();
}

function loadHistory(){
  let data = JSON.parse(localStorage.getItem("history")||"[]");
  let box = document.getElementById("historyBox");
  box.innerHTML="";

  data.forEach((d,i)=>{
    box.innerHTML += `
    <div class="bg-white p-3 rounded shadow mb-3">
      <b>${d.year} - ${d.title}</b>
      ${d.img?`<img src="${d.img}" class="mt-2 rounded">`:""}
      <p>${d.detail}</p>

      <!-- 🔥 Ad inside content -->
      <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-4253919332594790"
       data-ad-slot="1234567890"
       data-ad-format="auto"></ins>

      ${isAdmin?`<button onclick="del(${i})" class="bg-red-500 text-white px-2 py-1 mt-2 rounded">Delete</button>`:""}
    </div>`;
  });

  (adsbygoogle = window.adsbygoogle || []).push({});
}

function del(i){
  let data = JSON.parse(localStorage.getItem("history"));
  data.splice(i,1);
  localStorage.setItem("history",JSON.stringify(data));
  loadHistory();
}

window.onload=()=>{
  go("intro");
  updateUI();
};
</script>

</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto min-h-screen relative">

<!-- VIDEO INTRO -->
<div id="intro" class="page h-screen relative overflow-hidden">

<video autoplay muted loop playsinline class="video-bg">
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="relative flex flex-col justify-center items-center h-full text-white text-center px-4">
<h1 class="text-2xl font-bold mb-3">বাংলাদেশের ইতিহাস</h1>
<p class="mb-4">Welcome to see history of Bangladesh 🇧🇩</p>

<button onclick="enterSite()" class="bg-green-500 px-6 py-2 rounded">
▶ Enter
</button>
</div>

</div>

<!-- HOME -->
<div id="home" class="page hidden text-center p-4">

<h2 class="font-bold mb-2">স্বাগতম</h2>

<button onclick="go('history'); loadHistory()" class="bg-green-500 text-white p-2 w-full mt-2 rounded">📚 ইতিহাস</button>

<button id="adminBtn" onclick="go('login')" class="bg-purple-500 text-white p-2 w-full mt-2 rounded">Admin Login</button>

<button id="logoutBtn" onclick="logout()" class="bg-gray-500 text-white p-2 w-full mt-2 rounded hidden">Logout</button>

</div>

<!-- LOGIN -->
<div id="login" class="page hidden p-4">
<input id="pass" type="password" placeholder="Password" class="border p-2 w-full">
<button onclick="login()" class="bg-green-500 text-white p-2 w-full mt-2 rounded">Login</button>
</div>

<!-- HISTORY -->
<div id="history" class="page hidden p-4">
<button onclick="go('home')">← Back</button>

<button id="addBtn" onclick="go('form')" class="bg-green-500 text-white p-2 w-full mt-2 rounded hidden">Add History</button>

<div id="historyBox"></div>
</div>

<!-- FORM -->
<div id="form" class="page hidden p-4">
<input id="year" placeholder="Year" class="border p-2 w-full mt-2">
<input id="title" placeholder="Title" class="border p-2 w-full mt-2">
<textarea id="details" class="border p-2 w-full mt-2"></textarea>
<input type="file" id="img" class="mt-2">
<button onclick="saveHistory()" class="bg-green-600 text-white p-2 w-full mt-2 rounded">Save</button>
</div>

<!-- FOOTER -->
<p class="text-center mt-4">👨‍💻 Developed by DIPTO BISWAS</p>

</div>

</body>
</html>
