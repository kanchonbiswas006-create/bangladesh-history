<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাংলাদেশের ইতিহাস</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.video-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  color: white;
  padding: 20px;
}
</style>
</head>

<body>

<video autoplay muted loop class="video-bg">
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay">

<h1 class="text-3xl font-bold text-center">
Welcome to see history of Bangladesh
</h1>

<!-- 📜 Content দেখানোর জায়গা -->
<div id="content" class="mt-10 text-lg"></div>

<!-- 🔐 Login Button -->
<div class="mt-10 text-center">
<button onclick="showLogin()" class="bg-blue-500 px-4 py-2 rounded">
Admin Login
</button>
</div>

</div>

<!-- 🔐 LOGIN PANEL -->
<div id="loginBox" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-80 flex justify-center items-center">
  <div class="bg-white text-black p-5 rounded">
    <h2 class="text-xl mb-3">Admin Login</h2>
    <input id="pass" type="password" placeholder="Password" class="border p-2 w-full">
    <button onclick="login()" class="bg-green-500 text-white px-4 py-2 mt-3 w-full">Login</button>
  </div>
</div>

<!-- 🛠️ ADMIN PANEL -->
<div id="adminPanel" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-90 p-5 text-white">
  <h2 class="text-2xl mb-5">Admin Panel</h2>

  <textarea id="newContent" placeholder="Write content..." class="w-full p-3 text-black"></textarea>

  <button onclick="saveContent()" class="bg-green-500 px-4 py-2 mt-3">Save</button>
  <button onclick="logout()" class="bg-red-500 px-4 py-2 mt-3">Logout</button>
</div>

<!-- 🔥 Monetag -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

<!-- ⚙️ Script -->
<script>

function showLogin(){
  document.getElementById("loginBox").classList.remove("hidden");
}

function login(){
  let pass = document.getElementById("pass").value;
  if(pass === "1234"){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
  } else {
    alert("Wrong Password");
  }
}

function logout(){
  document.getElementById("adminPanel").classList.add("hidden");
}

function saveContent(){
  let text = document.getElementById("newContent").value;
  localStorage.setItem("siteContent", text);
  loadContent();
  alert("Saved!");
}

function loadContent(){
  let data = localStorage.getItem("siteContent");
  if(data){
    document.getElementById("content").innerHTML = data;
  } else {
    document.getElementById("content").innerHTML = "এখানে কনটেন্ট যোগ করুন";
  }
}

loadContent();

</script>

</body>
</html>
